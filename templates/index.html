<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelioCast | DC Power Forecast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h2 class="text-center text-primary mb-4">HelioCast</h2>
                    <p class="text-muted text-center mb-4">Enter real-time NREL weather sensor data to predict solar grid DC Power output.</p>
                    
                    <form action="/predict" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Ambient Temperature (°C)</label>
                            <input type="number" step="any" class="form-control" name="ambient_temp" placeholder="e.g., 25.1" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Module Temperature (°C)</label>
                            <input type="number" step="any" class="form-control" name="module_temp" placeholder="e.g., 40.5" required>
                            <small class="text-muted">Used to calculate thermal drift efficiency loss.</small>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Solar Irradiation (W/m²)</label>
                            <input type="number" step="any" class="form-control" name="irradiation" placeholder="e.g., 0.85" required>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Forecast DC Power</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
