<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelioCast | Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .result-box { font-size: 3rem; font-weight: bold; color: #198754; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="card p-5 shadow-sm border-0">
                    <h2 class="mb-3 text-secondary">Predicted Output</h2>
                    <p class="text-muted">Based on thermodynamic features and current irradiation.</p>
                    
                    <div class="result-box my-4">
                        {{ prediction }} <span style="font-size: 1.5rem; color: #6c757d;">kW</span>
                    </div>
                    
                    <div class="mt-4">
                        <a href="/" class="btn btn-outline-primary">Run Another Forecast</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
